name: Daily Hatena AI/ML Fetch

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 9:00 JST (= 0:00 UTC)
  workflow_dispatch:       # 手動実行も可能

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fetcher
        run: python hatena_ai_ml.py

      - name: Commit result CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hatena_ai_ml_result.csv
          git diff --cached --quiet || git commit -m "Update result $(date +'%Y-%m-%d')"
          git push
